services:
  voyagers-server:
    image: "ghcr.io/kharnsedreed/voyagers-of-nera-linux-docker:latest"
    depends_on:
      - voyagers-tailscale
    network_mode: "service:voyagers-tailscale"
    restart: unless-stopped
    container_name: voyagers-server
    environment:
      - EOS_OVERRIDE_HOST_IP=${EOS_OVERRIDE_HOST_IP}
    volumes:
      - "/data/games/voyagers/server:/dedicated-server"
      - "/data/games/voyagers/saved:/dedicated-server/BoatGame/Saved"
      - "/data/games/voyagers/config:/dedicated-server/BoatGame/Saved/PersistedData/CustomConfig"
    # ports:
    #   - "7777:7777/udp"  # game port
    #   - "7778:27015/udp" # steam query port

  voyagers-tailscale:
    image: tailscale/tailscale:latest
    container_name: voyagers-tailscale
    hostname: voyagers
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - /var/lib/tailscale/voyagers:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
    restart: unless-stopped
    networks:
      - voyagers_nw
    ports:
      - "7777:7777/udp"
      - "7778:27015/udp"
networks:
  voyagers_nw:
    name: voyagers_nw