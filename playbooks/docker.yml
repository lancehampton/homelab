---
# Docker: install Docker Engine via official apt repo
# Docs: https://docs.docker.com/engine/install/ubuntu/
- name: Install Docker
  hosts: all
  become: true
  gather_facts: true

  tasks:
    # Docker storage lives on a dedicated LV on the 1TB data disk.
    # The LV and fstab entry are already created — just ensure it's mounted.
    - name: Create /var/lib/docker mount point
      ansible.builtin.file:
        path: /var/lib/docker
        state: directory
        mode: '0710'

    - name: Mount Docker volume
      ansible.posix.mount:
        path: /var/lib/docker
        src: /dev/data/docker
        fstype: ext4
        opts: defaults
        state: mounted

    - name: Remove conflicting packages
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose
          - docker-compose-v2
          - docker-doc
          - podman-docker
          - containerd
          - runc
        state: absent

    - name: Install Docker prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true

    - name: Create keyrings directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Add Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'

    - name: Add Docker apt repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/ubuntu
          {{ ansible_distribution_release }} stable
        filename: docker
        state: present

    - name: Install Docker Engine
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Add admin user to docker group
      ansible.builtin.user:
        name: "{{ admin_user }}"
        groups: docker
        append: true

    - name: Enable and start Docker service
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true
