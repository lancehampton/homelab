---
# Bootstrap: initial server setup (user, SSH hardening, base packages)
# Run first with: ansible-playbook playbooks/bootstrap.yml --ask-pass --ask-become-pass
- name: Bootstrap server
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Update apt cache and upgrade packages
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
        cache_valid_time: 3600

    - name: Install base packages
      ansible.builtin.apt:
        name:
          - curl
          - wget
          - git
          - htop
          - unzip
          - ufw
          - fail2ban
          - net-tools
        state: present

    - name: Disable networkd-dispatcher (noisy with Docker veth interfaces)
      ansible.builtin.systemd:
        name: networkd-dispatcher
        state: stopped
        enabled: false

    - name: Set timezone
      community.general.timezone:
        name: America/New_York

    - name: Set data mount ownership
      ansible.builtin.file:
        path: /data
        owner: "{{ admin_user }}"
        group: "{{ admin_user }}"
        mode: '0755'

    - name: Set hostname
      ansible.builtin.hostname:
        name: "{{ hostname }}"

    - name: Ensure admin user exists
      ansible.builtin.user:
        name: "{{ admin_user }}"
        shell: /bin/bash
        groups: sudo
        append: true
        create_home: true

    - name: Deploy SSH authorized key
      ansible.posix.authorized_key:
        user: "{{ admin_user }}"
        key: "{{ lookup('file', lookup('env', 'HOME') + '/.ssh/homelab_ed25519.pub') }}"
        state: present

    - name: Harden SSH - disable root login
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin no'
      notify: Restart sshd

    - name: Harden SSH - enable pubkey auth
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PubkeyAuthentication'
        line: 'PubkeyAuthentication yes'
      notify: Restart sshd

    - name: Keep password auth enabled (emergency access)
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication yes'
      notify: Restart sshd

    # Docs: https://ubuntu.com/server/docs/how-to/software/automatic-updates/
    - name: Install unattended-upgrades
      ansible.builtin.apt:
        name:
          - unattended-upgrades
          - apt-listchanges
        state: present

    - name: Enable automatic security updates
      ansible.builtin.copy:
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        mode: '0644'
        content: |
          APT::Periodic::Update-Package-Lists "1";
          APT::Periodic::Unattended-Upgrade "1";
          APT::Periodic::AutocleanInterval "7";

    - name: Configure UFW - allow SSH
      community.general.ufw:
        rule: allow
        port: '22'
        proto: tcp

    - name: Configure UFW - allow HTTP
      community.general.ufw:
        rule: allow
        port: '80'
        proto: tcp

    - name: Configure UFW - allow HTTPS
      community.general.ufw:
        rule: allow
        port: '443'

    - name: Configure UFW - allow Cockpit
      community.general.ufw:
        rule: allow
        port: '9090'
        proto: tcp

    - name: Configure UFW - allow Home Assistant
      community.general.ufw:
        rule: allow
        port: '8123'
        proto: tcp

    - name: Enable UFW
      community.general.ufw:
        state: enabled
        default: deny

  handlers:
    - name: Restart sshd
      ansible.builtin.systemd:
        name: sshd
        state: restarted
